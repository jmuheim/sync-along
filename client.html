<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Sync Along client</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #a8b2d8; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    #status { font-size: 1.2rem; margin-bottom: 1rem; }
    #status.connected { color: #64ffda; }
    #status.disconnected { color: #e94560; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: currentColor; margin-right: 6px; }
    #debug-bar { position: fixed; top: 0; left: 0; right: 0; background: rgba(15,52,96,0.92); color: #a8b2d8; padding: 0.35rem 0.75rem; font-size: 0.72rem; font-family: system-ui, monospace, sans-serif; display: flex; align-items: center; gap: 0.6rem; z-index: 9999; line-height: 1; border-bottom: 1px solid rgba(100,255,218,0.15); }
    #debug-badge { background: #555; color: #0a0a1a; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.7rem; }
    #debug-dims { color: #6b7db3; }
  </style>
</head>
<body>
  <div id="debug-bar"><span id="debug-badge">—</span><span id="debug-dims">—</span></div>
  <p id="status" class="disconnected"><span class="dot"></span>Waiting for master…</p>
  <script>
    (function () {
      var CLIENT_COLORS = ['#64ffda','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'];
      var wsURL = 'ws://' + location.host + '?role=client';
      var lastRatio = -1;
      var ws = null;
      var resizeTimer = null;
      var scrollTimer = null;
      var status = document.getElementById('status');
      var debugBadge = document.getElementById('debug-badge');
      var debugDims = document.getElementById('debug-dims');

      function updateDebugDims() {
        if (!debugDims) return;
        var vpW = window.innerWidth, vpH = window.innerHeight;
        var scrollY = Math.round(window.scrollY);
        var pageH = document.documentElement.scrollHeight;
        var pageW = document.documentElement.scrollWidth;
        debugDims.textContent = 'VP ' + vpW + '×' + vpH + ' Scroll ' + scrollY + 'px Page ' + pageW + '×' + pageH;
      }

      function sendViewport() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({
            type: 'viewport',
            height: window.innerHeight,
            width: window.innerWidth,
            scrollY: Math.round(window.scrollY),
            pageHeight: document.documentElement.scrollHeight,
            pageWidth: document.documentElement.scrollWidth,
          }));
        }
      }

      window.addEventListener('resize', function () {
        if (window.__circleSyncClient) return;
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () { sendViewport(); updateDebugDims(); }, 300);
      });

      window.addEventListener('scroll', function () {
        if (window.__circleSyncClient) return;
        updateDebugDims();
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(sendViewport, 500);
      });

      document.addEventListener('touchmove', function(e) {
        if (e.scale !== undefined && e.scale !== 1) e.preventDefault();
      }, { passive: false });
      document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });

      updateDebugDims();

      function connect() {
        ws = new WebSocket(wsURL);
        ws.onopen = function () {
          if (status) { status.className = 'connected'; status.innerHTML = '<span class="dot"></span>Connected'; }
          window.__circleSyncClientWS = ws;
          sendViewport();
        };
        ws.onmessage = function (e) {
          var m = JSON.parse(e.data);
          if (m.type === 'page') {
            lastRatio = -1;
            document.open();
            document.write(m.html);
            document.close();
            window.scrollTo(0, 0);
          } else if (m.type === 'scroll') {
            if (m.ratio !== lastRatio) {
              var down = m.ratio > lastRatio;
              lastRatio = m.ratio;
              var scrollable = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
              var clientRatio = window.scrollY / scrollable;
              if ((down && m.ratio > clientRatio) || (!down && m.ratio < clientRatio))
                window.scrollTo(0, m.ratio * scrollable);
            }
            updateDebugDims();
          } else if (m.type === 'requestViewport') {
            sendViewport();
          } else if (m.type === 'clientInfo') {
            if (debugBadge) {
              debugBadge.textContent = m.name;
              debugBadge.style.background = CLIENT_COLORS[m.colorIndex % CLIENT_COLORS.length];
            }
          }
        };
        ws.onclose = function () {
          if (window.__circleSyncClient) return;
          if (status) { status.className = 'disconnected'; status.innerHTML = '<span class="dot"></span>Reconnecting…'; }
          setTimeout(connect, 2000);
        };
      }
      connect();
    })();
  </script>
</body>
</html>
